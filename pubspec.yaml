name: hamchannel
description: "OFDM/LDPC soundcard data modem for VHF/UHF FM radios."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Cryptographic hashes (SHA-256 file verification). Pure Dart.
  crypto: ^3.0.3
  # Native file-open dialogs for the Send Files tab.
  file_picker: ^10.1.0
  # Microphone capture (48 kHz PCM16 stream).
  record: ^6.0.0
  # Raw PCM playback stream (miniaudio based, all desktops).
  mp_audio_stream: ^0.1.5
  # Standard locations for the received/shared folders.
  path_provider: ^2.1.0
  # Config persistence.
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
